services:
  - type: web
    name: shefinaware-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false # Set this in the Render dashboard (Optional but recommended)
